<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تتبع غيابات الامتحانات - لوحة التحكم</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard">
        <!-- الشريط الجانبي -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-university"></i>
                <h2>نظام الغيابات</h2>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-home"></i>
                    <span>لوحة التحكم</span>
                </a>
                <a href="#" class="nav-item" data-page="absences">
                    <i class="fas fa-calendar-times"></i>
                    <span>تسجيل الغياب</span>
                </a>
                <a href="#" class="nav-item" data-page="justifications">
                    <i class="fas fa-file-alt"></i>
                    <span>إدارة التبريرات</span>
                </a>
                <a href="#" class="nav-item" data-page="students">
                    <i class="fas fa-users"></i>
                    <span>الطلبة</span>
                </a>
                <a href="#" class="nav-item" data-page="retake">
                    <i class="fas fa-redo-alt"></i>
                    <span>الاستدراك</span>
                </a>
                <a href="#" class="nav-item" data-page="statistics">
                    <i class="fas fa-chart-bar"></i>
                    <span>الإحصائيات</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="usernameDisplay"></span>
                </div>
                <button onclick="logout()" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>تسجيل خروج</span>
                </button>
            </div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">
            <!-- رأس الصفحة -->
            <header class="content-header">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 id="pageTitle">لوحة التحكم</h1>
                <div class="header-actions">
                    <span class="role-badge" id="userRole"></span>
                </div>
            </header>

            <!-- محتوى الصفحات -->
            <div class="content-body" id="contentBody">
                <!-- سيتم تحميل المحتوى ديناميكياً -->
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
